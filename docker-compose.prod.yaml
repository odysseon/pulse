#  Production Overrides
services:
  # ── Database Override ──────────────────────────────────────────────────────
  db:
    restart: always
    ports: !reset [] # Ensure database is not accessible from the public internet
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
        reservations:
          memory: 256m

  # ── Application Override ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      target: production # Uses the slim image with no devDependencies
    restart: always
    volumes: !reset [] # Production code is baked into the image[cite: 1]
    ports: !reset [] # App is isolated; traffic must flow through the proxy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512m
        reservations:
          memory: 128m

  # ── Proxy Override ─────────────────────────────────────────────────────────
  proxy:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64m
