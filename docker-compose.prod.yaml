services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    networks:
      - external
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128m

  backend:
    build:
      context: .
      target: production
      args:
        DATABASE_URL: ${DATABASE_URL}
    restart: always
    env_file: .env.production
    volumes: []
    ports: []
    networks:
      - external
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8008/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.75'
          memory: 170m
        reservations:
          memory: 64m

  proxy:
    restart: always
    ports:
      - '80:80'
    networks:
      - external
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64m

networks:
  external:
    driver: bridge
