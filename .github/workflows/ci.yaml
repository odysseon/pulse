name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Type-check and lint ─────────────────────────────────────────────────────
  check:
    name: Type-check & lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm generate

      - name: Type-check
        id: typecheck
        run: pnpm typecheck

      - name: Lint
        id: lint
        run: pnpm lint

  # ── Docker image build ──────────────────────────────────────────────────────
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    if: |
      always() &&
      !contains(needs.*.result, 'cancelled')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: false
          tags: campuspulse:pr-${{ github.event.pull_request.number || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ── Notify on check failures ────────────────────────────────────────────────
  notify-failure:
    name: Report check failures
    runs-on: ubuntu-latest
    needs: check
    if: |
      always() &&
      needs.check.result == 'failure'

    steps:
      - name: Log failures
        run: |
          echo "### ⚠️ Type-check or lint failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the **${{ needs.check.result }}** job logs for details." >> $GITHUB_STEP_SUMMARY
