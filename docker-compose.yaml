services:
  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgis/postgis:18-3.6
    container_name: pulse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-app_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pulse_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Application (Matches 'backend' in Nginx) ───────────────────────────────
  backend:
    build:
      context: .
      target: development
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-app_db}
    volumes:
      - ./src:/app/src:ro
      - ./generated:/app/generated
      - /app/node_modules
    # remove ports — can't bind same host port across replicas
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal

  # ── Nginx Proxy ─────────────────────────────────────────────────────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: pulse_proxy
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - external

volumes:
  postgres_data:
    name: pulse_db_data

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
