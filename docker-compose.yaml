services:
  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pulse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-app_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Application (Matches 'backend' in Nginx) ───────────────────────────────
  backend:
    build:
      context: .
      target: builder
    container_name: pulse_backend
    restart: unless-stopped
    command: sh -c "pnpm exec prisma db push --accept-data-loss && pnpm dev"
    env_file: .env
    environment:
      NODE_ENV: development
      # Note: 'db' matches the service name above
      DATABASE_URL: postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-app_db}
    volumes:
      - ./src:/app/src:ro
      - /app/node_modules
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Updated to match the /api/ health check in your DTOs
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ── Nginx Proxy ─────────────────────────────────────────────────────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: pulse_proxy
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - external

volumes:
  postgres_data:
    name: pulse_db_data

networks:
  internal:
    driver: bridge
    # Keep 'internal: true' to isolate DB/Backend from direct internet access
    internal: true
  external:
    driver: bridge
